# Which keyboard devices to enable Keyd on
[ids]

# Enable on all keyboards, mice, etc.
*


# Global settings
[global]

# Turn capslock light on when non-default (i.e. not the "main") layer is active
layer_indicator = 1

# Delay between emitted keys when executing a macro in microseconds
# macro_sequence_timeout =

# The maximum time between successive keys interpreted as part of a chord in milliseconds
chord_timeout = 100


# Default layer
[main]

# Switch capslock and escape
capslock = esc
esc = capslock

# Using overloadt() instead of layer() as the latter doesn't have an option to preserve the original key's function when it's tapped.
# 150 ms delay as the default triggers the layer too rapidly
space = overloadt(navigation, space, 150)

space+tab = layer(macros)

# Could use something like "leftmeta = overload(leftmeta, leftmeta)" (taken from keyd.rvaiya(1)), define a leftmeta layer below
# and then use "space = toggle(swedish)" inside it, with the advantage being that you wouldn't have to depress both buttons simultaneously
# and instead could just press and hold leftmeta followed space. Downside is that it'd render other (window manager level) keybinds
# which function based off of having leftmeta held down while pressing another key (e.g. leftmeta+w to close the current window) broken.
#
# Keyd does have layout support (via setlayout()), but I simply wanna be able to use åäö while still maintaining the US layout for the other keys,
# hence this wacky setup
leftmeta+space = toggle(swedish)


[navigation]

h = left
j = down
k = up
l = right

0 = home

# Composite layer (see keyd.rvaiya(1))
[navigation+shift]
4 = end


[macros]
# Note: sadly limited to 64 chars :(
# i = macro(ip space -c space -br space a enter)


[swedish]

[ = å
' = ä
; = ö

# Composite layer (see keyd.rvaiya(1))
[swedish+shift]
[ = Å
' = Ä
; = Ö

