# Quality of life
set -g default-terminal "screen-256color"
set -g escape-time 10 # Cannot be 0 or else Tmux prints out random characters when terminal is focused
set -g history-limit 100000
set -g wrap-search off
set -g display-time 3000
set -g status-interval 5
set -g focus-events on

# Start window and pane indices from 1 for easier navigation.
set -g base-index 1
set -g pane-base-index 1

set -g renumber-windows on # Rename windows when after closing to keep them sequential.

set -g mouse on

# Unbind and rebind the prefix key
# unbind C-[KEY]
# set -g prefix C-[KEY]
# bind C-[KEY] send-prefix

unbind -n C-n # Ctrl-n (and ctrl-p) are used for navigating the command history in Bash and many other places by default

# Navigate session picker with C-p and C-n
bind -T choose-tree C-p send-keys -X up
bind -T choose-tree C-n send-keys -X down

# Navigate windows using C-h & l
bind -n C-h previous-window
bind -n C-l next-window
# bind -n C-[KEY] last-window

# Navigate panes using C-j & k
bind -n C-j select-pane -t :.-
bind -n C-k select-pane -t :.+

# Move windows using c+w < & >
bind < swap-window -t -1
bind > swap-window -t +1

set -g mode-keys vi

bind -T prefix v copy-mode                                                             # Enter copy mode using prefix + v. NOTE: copy-mode-vi is an entry command (subset) of copy-mode, not two different modes. You enter copy-mode, then use copy-mode-vi
bind -T copy-mode-vi v send-keys -X begin-selection                                    # Enter visual (and visual-line) mode while in copy mode with v
bind -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle # Enter visual-block mode while in copy mode with C-V

# Use "v" to either copy the current line (without having to enter visual mode first) while in copy-mode or the visual selection if already in visual mode
bind -T copy-mode-vi y if-shell -F '#{selection_present}' \
    'send-keys -X copy-pipe-and-cancel "wl-copy"' \
    'send-keys -X copy-pipe-line-and-cancel "wl-copy"'

bind -T copy-mode-vi Escape send-keys q # Use escape to exit visual mode

bind -T prefix S new-session
bind X confirm-before -p "kill-session? (y/n)" kill-session
bind x confirm-before -p "kill-window? (y/n)" kill-window

# Status bar
set -g status-position bottom

set -g status-style bg=default,fg=default # Make bar transparent (inherits terminal background)
set -g status-interval 1 # Update datetime every second

set -g status-left "" # Remove session indicator

# Session name + datetime
set -g status-right-style bg=default,fg=colour2
set -g status-right "\"#S\"  %H:%M:%S %d/%m/%Y"

# Light grey window text, transparent background, name only
set -g window-status-style bg=default,fg=colour245
set -g window-status-format " #{?window_zoomed_flag,#[fg=yellow],#[fg=colour245]}#W#{window_flags} "

# Active/focused window: green text, transparent background
set -g window-status-current-style  bg=default,fg=colour2
set -g window-status-current-format " #{?window_zoomed_flag,#[fg=yellow],#[fg=colour2]}#W#{window_flags} "

# Tighten up the gaps between window names
set -g window-status-separator ""

# Resurrect and continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-save-interval '5'

# Extrakto
set -g @extrakto_filter_order "word all line path url quote s-quote"
set -g @extrakto_popup_size '50%'
set -g @extrakto_copy_key 'tab'
set -g @extrakto_insert_key 'enter'
set -g @extrakto_clip_tool 'wl-copy' # Set explicitely as "auto" fails at times.

# Tmux-fingers
set -g @fingers-key f
set -g @fingers-jump-key J

# Paste by default and copy on shift
set -g @fingers-main-action ':paste:'
set -g @fingers-shift-action ':copy:'

# tmux-floax
set -g @floax-bind 'a'
set -g @floax-width '54%'
set -g @floax-height '58%'
set -g @floax-session-name 'Floax'
set -g @floax-title '-'
set -g @floax-border-color 'orange'
set -g @floax-text-color 'white'
set -g @floax-change-path 'false'

# Tmux-zap
set -g @zap_key 's'
set -g @zap_mode 'window' # Display windows not panes in session picker
set -g @zap_width '40%'
set -g @zap_height '40%'

# Plugins
set -g @plugin 'tmux-plugins/tpm'

# Disabled as resurrect gets stuck in loop after reboot
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cowboy'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'omerxx/tmux-floax'
# set -g @plugin 'AleckAstan/tmux-zap'

run '~/.tmux/plugins/tpm/tpm' # Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
